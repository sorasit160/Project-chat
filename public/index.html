<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chat - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>Join the Chat</h2>
            <p>Please enter your name to start chatting</p>
            <form id="login-form">
                <input type="text" id="username-input" placeholder="Your Name" required maxlength="15">
                <button type="submit">Join Now</button>
            </form>
        </div>
    </div>

    <div class="background-decor"></div>
    <div class="chat-container">
        <header>
            <div class="status-indicator"></div>
            <h1>Customer Support</h1>
            <span class="online-status">Online</span>
        </header>
        <div id="chat-messages" class="messages-area">
            <!-- Messages will appear here -->
            <div class="message system">Welcome to our support! How can we help you today?</div>
        </div>
        <div id="typing-indicator" class="typing-indicator"></div>
        <form id="chat-form" class="input-area">
            <div class="emoji-wrapper">
                <button type="button" id="emoji-btn" class="emoji-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 14C8 14 9.5 16 12 16C14.5 16 16 14 16 14" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 9H9.01" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 9H15.01" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div id="emoji-picker" class="emoji-picker">
                    <!-- Emojis will be injected here -->
                </div>
            </div>
            <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off" required>
            <button type="submit">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </form>
    </div>

    <!-- Socket.io library -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
